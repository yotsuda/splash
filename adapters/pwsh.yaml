schema: 1
name: pwsh
version: 1.0.0
description: PowerShell 7+ (and Windows PowerShell 5.1 via `powershell` alias)
homepage: https://github.com/PowerShell/PowerShell
license: MIT
family: shell

aliases:
  - powershell

process:
  command_template: '"{shell_path}" -NoExit -Command "{init_invocation}"'
  inherit_environment: false
  env:
    POWERSHELL_TELEMETRY_OPTOUT: "1"
  encoding: utf-8
  line_ending: "\r"

ready:
  wait_for_event: prompt_start
  timeout_ms: 0
  settle_before_inject_ms: 0
  kick_enter_after_ready: false

init:
  strategy: shell_integration
  hook_type: precommand_lookup_action
  delivery: launch_command
  tempfile:
    prefix: .ripple-integration-
    extension: .ps1
  init_invocation_template: "Import-Module PSReadLine -ErrorAction SilentlyContinue; . '{tempfile_path}'; Remove-Item '{tempfile_path}' -ErrorAction SilentlyContinue"
  script_resource: integration.ps1
  banner_injection:
    mode: prepend_to_tempfile
    banner_template: |
      Write-Host '{banner}' -ForegroundColor Green
    reason_template: |
      Write-Host 'Reason: {reason}' -ForegroundColor DarkYellow

prompt:
  strategy: shell_integration
  shell_integration:
    protocol: osc633
    markers:
      prompt_start: "\x1b]633;A\x07"
      command_input_start: "\x1b]633;B\x07"
      command_executed: "\x1b]633;C\x07"
      command_finished: "\x1b]633;D\x07"
      property_update: "\x1b]633;P\x07"
    property_updates:
      cwd_key: Cwd

output:
  post_prompt_settle_ms: 0
  strip_ansi: false
  strip_input_echo: true
  input_echo_strategy: osc_boundaries
  line_ending: "\r\n"

input:
  line_ending: "\r"
  multiline_detect: prompt_based
  # encoded_scriptblock: base64-encode the body, send a single-line
  # `. ([ScriptBlock]::Create(...))` invocation — no disk I/O, no
  # tempfile cleanup, no history-filter bookkeeping; ~0.3-0.5s faster
  # on the warm path than tempfile. The earlier baseline-bleed race
  # (synth-prompt tail leaking into the AI-facing output when a single
  # PTY read spanned OSC C and subsequent command output) is fixed by
  # feeding the worker's _vtState in slices aligned to OSC event
  # offsets, so Snapshot() at CommandExecuted reflects state AS OF the
  # OSC C byte rather than end-of-chunk state. tempfile remains
  # selectable for bodies whose decoded length would exceed
  # PSReadLine's input line cap.
  multiline_delivery: encoded_scriptblock
  tempfile:
    prefix: .ripple-exec-
    extension: .ps1
    path_template: "{temp_dir}/.ripple-exec-{pid}-{guid}.ps1"
    invocation_template: ". '{path}'; Remove-Item '{path}' -ErrorAction SilentlyContinue"
    history_filter: '\.ripple-exec-.*\.ps1'
    cleanup_on_start: true
    stale_ttl_hours: 24

signals:
  interrupt: "\x03"
  eof: "\x04"
  suspend: null

lifecycle:
  ready_timeout_ms: 0
  shutdown:
    command: "exit"
    grace_ms: 1000
    force_signal: kill
  restart_on: [crash]

capabilities:
  stateful: true
  interrupt: true
  meta_commands: false
  auto_modes: false
  async_output: false
  exit_code: true
  cwd_tracking: true
  cwd_format: windows_native
  job_control: false
  shell_integration: osc633
  user_busy_detection: osc_b
  cd_command: "Set-Location -LiteralPath '{path}'"
  cd_command_quote: single_quote_pwsh

probe:
  eval: "1 + 1"
  expect: '^2$'

tests:
  - name: simple_arithmetic
    eval: "2 + 3"
    expect: '^5$'
  - name: variable_persistence
    setup: "$x = 42"
    eval: "$x * 2"
    expect: '^84$'
  - name: multiline_function
    eval: |
      function double { param($x) $x * 2 }
      double 21
    expect: '^42$'
  - name: error_surfaces_nonzero_exit
    # Native non-zero exit propagates verbatim: $? is false AND
    # $LASTEXITCODE was updated BY THIS pipeline (the snapshot taken at
    # PreCommandLookupAction differs from the post-pipeline value), so
    # integration.ps1's exit-code resolver emits exit 7.
    eval: "cmd /c exit 7"
    expect_exit_code: 7
    expect_error: true
  - name: cmdlet_error_surfaces_exit_1
    # PowerShell cmdlet errors set $? to false and write to the error
    # stream but do NOT update $LASTEXITCODE. Pre-fix the prompt fn read
    # stale $LASTEXITCODE and reported exit 0 (or worse: the last native
    # exe's exit from minutes ago). Post-fix, $? is the prime signal:
    # $? false + $LASTEXITCODE unchanged → generic failure exit 1, which
    # is the honest "pipeline failed, no meaningful native exit code"
    # signal.
    eval: Get-Item C:\does-not-exist-rpl1
    expect_exit_code: 1
    expect_error: true
  - name: lastexitcode_does_not_leak_after_native
    # Regression: stale $LASTEXITCODE from a prior native invocation
    # must NOT bleed into a subsequent pure-PowerShell pipeline. The
    # setup leaves $LASTEXITCODE=7; the eval is a pure PS expression
    # that never touches a native exe. Pre-fix the prompt fn blindly
    # read $LASTEXITCODE and reported exit 7 for the innocent 2+3 →
    # Failed. Post-fix the PreCommandLookupAction snapshot shows
    # $LASTEXITCODE is unchanged this pipeline, so the resolver defers
    # to $? (true) and emits exit 0.
    setup: cmd /c exit 7
    eval: "2 + 3"
    expect: '^5$'
    expect_exit_code: 0
  - name: cwd_change_tracked
    setup: "Set-Location $env:TEMP"
    eval: "$PWD.Path"
    expect_cwd_update: true
  - name: manual_lastexitcode_does_not_leak_in_pipeline
    # A bare `$LASTEXITCODE = 7` is just a variable assignment — no
    # native exe ran, so the AI surfacing it as `exit 7` / `LastExit: 7`
    # would be a phantom failure signal. Pre-fix the resolver gated only
    # on "did $LASTEXITCODE change this pipeline" (yes), and the manual
    # assignment leaked through identically to a real `cmd /c exit 7`.
    # Post-fix the integration script also tracks whether
    # PreCommandLookupAction ever resolved a command to Application;
    # without that signal $LASTEXITCODE is not consulted, exit stays 0,
    # and OSC L is suppressed.
    eval: |
      $LASTEXITCODE = 7
      "x"
    expect: '^x$'
    expect_exit_code: 0

